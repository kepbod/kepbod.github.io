<!DOCTYPE HTML>
<html lang="en">
    <head>
        <title>{{ site.title }}</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
        <meta name="description" content="{{ site.author.description | strip_html }}" />
        <meta property="og:title" content="{{ site.title }}" />
        <meta property="og:description" content="{{ site.author.description | strip_html }}" />
        <meta property="og:type" content="website" />
        <link rel="icon" href="/favicon.ico" type="image/x-icon" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="stylesheet" href="assets/html5up-eventually/css/main.css" />
    </head>
    <body>

        <!-- Header -->
        <header id="header">
            <h1>{{ site.author.name }}</h1>
            <p>{{ site.author.description }}</p>
        </header>

        <!-- Footer -->
        <footer id="footer">
            <ul class="icons">
                {% for contact in site.data.contacts %}
                <li><a href="{{ contact.url }}" class="icon {{ contact.icon }}" rel="noopener noreferrer"><span class="label">{{ contact.title }}</span></a></li>
                {% endfor %}
            </ul>
            <ul class="copyright">
                <li>&copy; {{ site.user }}</li><li>Powered by <a href="https://jekyllrb.com" rel="noopener noreferrer">Jekyll</a> and <a href="https://html5up.net" rel="noopener noreferrer">HTML5 UP</a></li>
            </ul>
        </footer>

        <!-- Scripts -->
        <script src="assets/html5up-eventually/js/main.js"></script>
        <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
        <script>
            window.dataLayer = window.dataLayer || [];
            function gtag(){dataLayer.push(arguments);}
            gtag('js', new Date());
            gtag('config', 'G-XXXXXXXXXX');
        </script>

    </body>
</html>
